<!doctype html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="/favicon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://actero.fr/" />

  <!-- Mona Sans — GitHub open source font -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/github/mona-sans@v1.0.1/dist/mona-sans.css" />

  <!-- Structured Data — Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Actero",
      "url": "https://actero.fr",
      "logo": "https://actero.fr/favicon-192.png",
      "description": "Agence IA specialisee dans l'automatisation pour e-commerce Shopify et agences immobilieres",
      "foundingDate": "2026",
      "founders": [
        { "@type": "Person", "name": "Pablo Priefert-Vallette" },
        { "@type": "Person", "name": "Gaspard Ain" }
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contact@actero.fr",
        "contactType": "sales"
      },
      "sameAs": [
        "https://www.linkedin.com/company/actero"
      ]
    }
  </script>

  <!-- Structured Data — WebSite -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Actero",
      "url": "https://actero.fr/"
    }
  </script>

  <!-- Structured Data — SoftwareApplication -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Actero",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "199",
        "priceCurrency": "EUR"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.9",
        "reviewCount": "127"
      }
    }
  </script>

  <!-- SEO Primaire -->
  <title>Actero — Automatisation IA pour E-commerce Shopify & Agences Immobilieres</title>
  <meta name="description"
    content="Actero deploie des agents IA autonomes pour automatiser le SAV e-commerce Shopify et qualifier les leads immobiliers. ROI mesurable des le premier mois." />
  <meta name="keywords"
    content="agent IA e-commerce, automatisation Shopify, agent SAV IA, chatbot IA immobilier, agence IA France" />

  <!-- Open Graph / Facebook / LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://actero.fr/" />
  <meta property="og:title" content="Actero — Automatisation IA pour E-commerce Shopify & Agences Immobilieres" />
  <meta property="og:description"
    content="Actero deploie des agents IA autonomes pour automatiser le SAV e-commerce Shopify et qualifier les leads immobiliers. ROI mesurable des le premier mois." />
  <meta property="og:image" content="https://actero.fr/og-image.png" />
  <meta property="og:locale" content="fr_FR" />
  <meta property="og:site_name" content="Actero" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://actero.fr/" />
  <meta name="twitter:title" content="Actero — Automatisation IA pour E-commerce Shopify & Agences Immobilieres" />
  <meta name="twitter:description"
    content="Actero deploie des agents IA autonomes pour automatiser le SAV e-commerce Shopify et qualifier les leads immobiliers. ROI mesurable des le premier mois." />
  <meta name="twitter:image" content="https://actero.fr/og-image.png" />

  <!-- Amplitude Setup -->
  <script src="https://cdn.eu.amplitude.com/script/8d23fc0b05efe38b235cb209e32af315.js"></script>
  <script>
    window.amplitude.add(window.sessionReplay.plugin({ sampleRate: 1 }));
    window.amplitude.init('8d23fc0b05efe38b235cb209e32af315', { "fetchRemoteConfig": true, "serverZone": "EU", "autocapture": true });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
